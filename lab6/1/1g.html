<!DOCTYPE html>
<html>
<body>
    <script>
        let n = parseInt(prompt("Введите размер массива:"));
        let arr = [];
        
        for (let i = 0; i < n; i++) {
            arr.push(Math.floor(Math.random() * 100));
        }
        
        arr.reverse();
        
        let output = "";
        for (let i = 0; i < arr.length; i++) {
            output += arr[i] + " ";
            if ((i + 1) % 5 === 0) {
                output += "\n";
            }
        }
        
        alert(output);
    </script>
</body>
</html>
