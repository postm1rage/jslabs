<!DOCTYPE html>
<html>
<body>
    <script>
        let today = new Date();
        let targetYear = today.getMonth() >= 8 ? today.getFullYear() + 1 : today.getFullYear();
        let targetDate = new Date(targetYear, 8, 1);
        
        let monthsDiff = (targetDate.getFullYear() - today.getFullYear()) * 12 
                       + (targetDate.getMonth() - today.getMonth());
        
        alert(`До 1 сентября осталось ${monthsDiff} месяцев`);
    </script>
</body>
</html>
