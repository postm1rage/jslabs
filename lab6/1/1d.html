<!DOCTYPE html>
<html>
<body>
    <script>
        let email = prompt("Введите адрес электронной почты:");
        
        if (email.indexOf('@') === -1) {
            alert("Предупреждение: в email отсутствует символ @");
        } else {
            alert("Email корректен");
        }
    </script>
</body>
</html>
